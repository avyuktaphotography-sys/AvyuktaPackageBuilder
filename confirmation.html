<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Booking Confirmation

</title>

<link
rel="stylesheet"
href="confirmation.css">

</head>

<body>

<div class="container">

<div class="successIcon">

✓

</div>

<h1>

Thank You!

</h1>

<p class="subtitle">

Your package has been created successfully.

</p>


<div class="summary">

<h2>

Booking Summary

</h2>

<div class="row">

<span>Name</span>

<strong id="custName"></strong>

</div>

<div class="row">

<span>Phone</span>

<strong id="custPhone"></strong>

</div>

<div class="row">

<span>Preferred Date</span>

<strong id="custDate"></strong>

</div>

<div class="row">

<span>Session</span>

<strong id="custSession"></strong>

</div>

<hr>

<h3>

Selected Themes

</h3>

<ul id="themeList">

</ul>

<hr>

<div class="row">

<span>Base Package</span>

<strong id="basePrice"></strong>

</div>

<div class="row">

<span>Additional Themes</span>

<strong id="extraThemes"></strong>

</div>

<div class="row">

<span>Additional Cost</span>

<strong id="extraCost"></strong>

</div>

<hr>

<div class="grandTotal">

Total

₹<span id="total"></span>

</div>

</div>

<button id="whatsappBtn">

Send Booking on WhatsApp

</button>

<button id="backBtn">

Back to Home

</button>

</div>

<script src="confirmation.js"></script>

</body>

</html>
