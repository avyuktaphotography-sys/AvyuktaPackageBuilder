<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Themes | Avyuktaphotography</title>
<link rel="stylesheet" href="themes.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-65JQNK8MX6"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-65JQNK8MX6');
</script>


</head>
<body>

<header class="topHeader">
    <h1>Select Your Themes</h1>
    <p>Choose your favourite photography themes</p>
</header>

<section class="customerCard">

<div class="customerGrid">

<div><strong>Name</strong><br><span id="custName"></span></div>

<div><strong>Phone</strong><br><span id="custPhone"></span></div>

<div><strong>Session</strong><br><span id="custSession"></span></div>

<div><strong>Preferred Date</strong><br><span id="custDate"></span></div>

</div>

</section>

<section class="infoBanner">

<div class="infoBox">
<h3>Base Package</h3>
<p id="packagePrice">₹7,000 / ₹10,000</p>
</div>

<div class="infoBox">
<h3>Included Themes</h3>
<p>4 Themes</p>
</div>

<div class="infoBox">
<h3>Additional Theme</h3>
<p id="extraPrice">₹1,500 / ₹2,000</p>
</div>

</section>

<div class="mainContainer">

<div class="leftSide">

<div class="progressCard">

<h2>Theme Selection</h2>

<p>
Selected
<strong><span id="selectedCount">0</span></strong>
of
<strong>4</strong>
included themes
</p>

<div class="progress">

<div
id="progressBar"
class="progressBar">

</div>

</div>

</div>

<div
id="themeContainer"
class="themeContainer">

<!-- Theme cards generated by themes.js -->

</div>

</div>

<aside class="cart">

<h2>Package Summary</h2>

<div id="cartDetails">

<p>Base Package</p>

</div>

<div class="total">

Total

<h1>
₹<span id="total">7000</span>
</h1>

</div>

<button
id="continueBtn">

Continue →

</button>

</aside>

</div>

<script src="themeData.js"></script>
<script src="themes.js"></script>

</body>
</html>
