<!DOCTYPE html>
<html lang="en">

<head>

</title>

<link

    href="themes.css">

</head>

<body>

    <h1>
        Avyuktaphotography

        Select Your Themes
    </p>

</div>

<div class="customer">

    <div id="customerInfo">
    </div>

</div>

<div class="note">

    ★ One theme is included in the package price.

    <br><br>

    ★ Additional themes will be charged extra.

    <br><br>

    Studio/Home:
    ₹1200 per additional theme.

    <br>

    Outdoor/Mix:

<div
    id="themeContainer"

</div>

<div class="cart">

    <h2>
        Package Summary
    </h2>

    <div

    </div>

    <div class="total">

        Total :

        Continue →
