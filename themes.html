<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>
    Avyuktaphotography
</title>

<link
    rel="stylesheet"
    href="themes.css">

</head>

<body>

<div class="header">

    <h1>
        Avyuktaphotography
    </h1>

    <p>
        Select Your Themes
    </p>

</div>

<div class="customer">

    <div class="customerGrid">

        <div>
            <b>Name :</b>
            <span id="custName"></span>
        </div>

        <div>
            <b>Phone :</b>
            <span id="custPhone"></span>
        </div>

        <div>
            <b>Session :</b>
            <span id="custSession"></span>
        </div>

        <div>
            <b>Date :</b>
            <span id="custDate"></span>
        </div>

    </div>

</div>

<div class="note">

    ★ Two themes are included in the package price.

    <br><br>

    ★ Additional themes will be charged extra.

    <br><br>

    Studio :
    ₹1500 per additional theme

    <br>

    Home/Outdoor/Mix :
    ₹2000 per additional theme

</div>

<div class="mainContainer">

    <div
        id="themeContainer"
        class="themeContainer">

    </div>

    <div class="cart">

        <h2>
            Package Summary
        </h2>

        <div
            id="cartDetails">

        </div>

        <div class="total">

            Total :
            ₹<span id="total">
                0
            </span>

        </div>

        <button>
            Continue →
        </button>

    </div>

</div>

<script src="themeData.js"></script>
<script src="themes.js"></script>

</body>
</html>
